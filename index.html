<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>王汝豪每天进步一点点</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f1a;
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }
  .app {
    width: 100%; max-width: 420px;
    min-height: 100vh;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ===== HOME ===== */
  .screen { display: none; flex-direction: column; flex: 1; padding: 24px 20px; }
  .screen.active { display: flex; }

  .home-header { text-align: center; padding-top: 40px; }
  .logo { font-size: 48px; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .title {
    font-size: 28px; font-weight: 900; color: #fff;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: #8892b0; font-size: 14px; margin-top: 4px; }

  .streak-card {
    margin: 28px 0 20px;
    background: linear-gradient(135deg, rgba(255,107,107,0.15), rgba(254,202,87,0.1));
    border: 1px solid rgba(255,107,107,0.3);
    border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 16px;
  }
  .streak-fire { font-size: 40px; }
  .streak-info { flex: 1; }
  .streak-num { font-size: 32px; font-weight: 900; color: #ff6b6b; }
  .streak-label { color: #8892b0; font-size: 13px; }

  .calendar-grid {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin: 0 0 20px;
    justify-content: flex-start;
  }
  .calendar-day {
    width: 14px; height: 14px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    transition: all 0.2s;
  }
  .calendar-day.done { background: #00b894; }
  .calendar-day.today { border: 2px solid #feca57; }
  .calendar-label {
    color: #8892b0; font-size: 11px; margin-bottom: 8px;
    display: flex; justify-content: space-between;
  }

  .subjects { display: flex; flex-direction: column; gap: 12px; }
  .subject-card {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 16px;
    cursor: pointer; transition: all 0.2s;
  }
  .subject-card:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
  .subject-icon { font-size: 32px; width: 48px; text-align: center; }
  .subject-text { flex: 1; }
  .subject-name { color: #fff; font-size: 17px; font-weight: 700; }
  .subject-desc { color: #8892b0; font-size: 12px; margin-top: 2px; }
  .subject-arrow { color: #8892b0; font-size: 20px; }

  .start-btn {
    margin-top: 24px;
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff; font-size: 20px; font-weight: 800;
    border: none; border-radius: 16px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(255,107,107,0.3);
  }
  .start-btn:active { transform: scale(0.96); opacity: 0.9; }

  /* ===== QUIZ ===== */
  .quiz-topbar {
    display: flex; align-items: center; gap: 12px;
    padding-bottom: 8px;
  }
  .back-btn {
    background: rgba(255,255,255,0.1); border: none;
    color: #fff; font-size: 18px; width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .back-btn:active { background: rgba(255,255,255,0.2); }
  .progress-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
  .progress-bar {
    flex: 1; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; overflow: hidden;
  }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #48dbfb, #0abde3); border-radius: 4px; transition: width 0.4s ease; }
  .progress-text { color: #8892b0; font-size: 13px; min-width: 32px; text-align: right; }

  .quiz-subject-tag {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.08); border-radius: 20px;
    padding: 6px 14px; font-size: 13px; color: #8892b0;
    margin-bottom: 24px;
  }

  .quiz-question {
    color: #fff; font-size: 20px; font-weight: 600;
    line-height: 1.6; margin-bottom: 28px;
    min-height: 80px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  .option {
    position: relative;
    background: rgba(255,255,255,0.06);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 18px 20px;
    color: #ccd6f6; font-size: 17px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 12px;
  }
  .option:active { transform: scale(0.98); }
  .option-letter {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 15px; color: #8892b0;
    flex-shrink: 0;
  }

  .option.correct {
    background: rgba(0,184,148,0.2); border-color: #00b894;
  }
  .option.correct .option-letter { background: #00b894; color: #fff; }
  .option.wrong {
    background: rgba(255,107,107,0.2); border-color: #ff6b6b;
    animation: shake 0.5s;
  }
  .option.wrong .option-letter { background: #ff6b6b; color: #fff; }
  .option.disabled { pointer-events: none; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  .feedback {
    display: none; margin-top: 20px;
    background: rgba(255,255,255,0.05); border-radius: 14px; padding: 16px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .feedback.show { display: block; }
  .feedback-header {
    display: flex; align-items: center; gap: 10px;
    font-size: 17px; font-weight: 700; margin-bottom: 10px;
  }
  .feedback.correct-fb .feedback-header { color: #00b894; }
  .feedback.wrong-fb .feedback-header { color: #feca57; }
  .feedback-body { color: #a8b2d1; font-size: 14px; line-height: 1.7; }

  .next-btn {
    display: none; margin-top: 16px;
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #48dbfb, #0abde3);
    color: #1a1a2e; font-size: 17px; font-weight: 800;
    border: none; border-radius: 14px;
    cursor: pointer; transition: all 0.2s;
  }
  .next-btn.show { display: block; }
  .next-btn:active { transform: scale(0.96); }

  /* ===== RESULT ===== */
  .result-screen { text-align: center; padding-top: 50px; }
  .result-icon { font-size: 64px; margin-bottom: 12px; }
  .result-score {
    font-size: 56px; font-weight: 900;
    background: linear-gradient(135deg, #feca57, #ff9f43);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .result-label { color: #8892b0; font-size: 15px; margin-bottom: 32px; }
  .result-detail { text-align: left; margin-bottom: 32px; }
  .result-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 14px; margin-bottom: 8px;
  }
  .result-row-icon { font-size: 24px; }
  .result-row-text { flex: 1; color: #ccd6f6; font-size: 15px; }
  .result-row-score { font-weight: 700; font-size: 16px; }
  .result-row-score.good { color: #00b894; }
  .result-row-score.bad { color: #ff6b6b; }

  .retry-btn {
    width: 100%; padding: 18px;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff; font-size: 18px; font-weight: 800;
    border: none; border-radius: 16px;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 8px 30px rgba(255,107,107,0.3);
  }
  .retry-btn:active { transform: scale(0.96); }

  /* ===== TOP BAR (persistent) ===== */
  .combo-bar {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 6px 14px; border-radius: 20px;
    background: rgba(254,202,87,0.15); border: 1px solid rgba(254,202,87,0.3);
    font-size: 14px; color: #feca57; font-weight: 700;
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    opacity: 0; transition: opacity 0.3s;
    z-index: 10;
  }
  .combo-bar.visible { opacity: 1; }
  .combo-bar.pulse { animation: pulse 0.5s ease; }
  @keyframes pulse {
    0% { transform: translateX(-50%) scale(1); }
    50% { transform: translateX(-50%) scale(1.15); }
    100% { transform: translateX(-50%) scale(1); }
  }

  /* ===== PARTICLES ===== */
  .particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 100;
  }
  .particle {
    position: absolute;
    font-size: 20px;
    animation: particle-fly 1s ease-out forwards;
  }
  @keyframes particle-fly {
    0% { opacity: 1; transform: translate(0, 0) scale(1); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
  }

  .overlay-msg {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
    font-size: 40px; font-weight: 900;
    pointer-events: none; z-index: 101;
    opacity: 0;
    transition: all 0.3s;
  }
  .overlay-msg.show { opacity: 1; }
  .overlay-msg.correct-msg { color: #00b894; }
  .overlay-msg.wrong-msg { color: #ff6b6b; }

  /* ===== LOADING ANIM ===== */
  .loading-dots { display: flex; gap: 6px; justify-content: center; padding: 20px; }
  .loading-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #48dbfb; animation: dot-bounce 0.6s infinite alternate;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-bounce {
    0% { transform: translateY(0); opacity: 0.4; }
    100% { transform: translateY(-12px); opacity: 1; }
  }

  /* ===== ANALYSIS PAGE ===== */
  .analysis-header { text-align: center; padding-top: 20px; margin-bottom: 20px; }
  .analysis-title { color: #fff; font-size: 22px; font-weight: 800; }
  .analysis-subtitle { color: #8892b0; font-size: 13px; margin-top: 4px; }

  .stats-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .stat-card {
    flex: 1; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px 10px; text-align: center;
  }
  .stat-num { font-size: 26px; font-weight: 900; color: #fff; }
  .stat-label { color: #8892b0; font-size: 11px; margin-top: 4px; }
  .stat-num.green { color: #00b894; }
  .stat-num.red { color: #ff6b6b; }
  .stat-num.yellow { color: #feca57; }

  .section-title {
    color: #8892b0; font-size: 12px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 1px; margin-bottom: 10px; margin-top: 8px;
  }

  .subject-bar-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 14px; margin-bottom: 10px;
  }
  .subject-bar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .subject-bar-icon { font-size: 24px; }
  .subject-bar-name { flex: 1; color: #ccd6f6; font-size: 15px; font-weight: 600; }
  .subject-bar-score { color: #fff; font-size: 15px; font-weight: 700; }
  .subject-bar-outer { height: 8px; background: rgba(255,255,255,0.08); border-radius: 4px; overflow: hidden; }
  .subject-bar-inner { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
  .subject-bar-inner.math-bar { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
  .subject-bar-inner.chinese-bar { background: linear-gradient(90deg, #48dbfb, #0abde3); }
  .subject-bar-inner.english-bar { background: linear-gradient(90deg, #feca57, #ff9f43); }

  .topic-row {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.04); border-radius: 10px;
    padding: 12px 14px; margin-bottom: 6px;
  }
  .topic-icon { font-size: 18px; width: 28px; text-align: center; }
  .topic-name { flex: 1; color: #ccd6f6; font-size: 14px; }
  .topic-score { font-weight: 700; font-size: 14px; }
  .topic-bar-wrap { width: 60px; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
  .topic-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  .log-item {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.04); border-radius: 10px;
    padding: 10px 14px; margin-bottom: 6px; font-size: 13px;
  }
  .log-icon { font-size: 18px; width: 28px; text-align: center; }
  .log-detail { flex: 1; }
  .log-subject { color: #ccd6f6; font-weight: 600; }
  .log-topic { color: #8892b0; }
  .log-status { font-weight: 700; font-size: 13px; }
  .log-status.ok { color: #00b894; }
  .log-status.fail { color: #ff6b6b; }

  .empty-state { text-align: center; padding: 40px 20px; color: #8892b0; }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .empty-text { font-size: 15px; line-height: 1.6; }

  .clear-btn {
    display: block; margin: 20px auto 0;
    background: none; border: 1px solid rgba(255,107,107,0.3);
    color: #ff6b6b; font-size: 13px; padding: 10px 24px;
    border-radius: 20px; cursor: pointer;
  }
  .clear-btn:active { background: rgba(255,107,107,0.1); }

  .nav-row {
    display: flex; gap: 10px; margin-top: 16px;
  }
  .nav-btn {
    flex: 1; padding: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccd6f6; font-size: 15px; font-weight: 600;
    border-radius: 14px; cursor: pointer; text-align: center;
    transition: all 0.2s;
  }
  .nav-btn:active { background: rgba(255,255,255,0.15); }
  .nav-btn.primary { background: linear-gradient(135deg, #48dbfb, #0abde3); color: #1a1a2e; border: none; font-weight: 800; }

  /* ===== ERROR BOOK ===== */
  .mistake-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .mistake-title { color: #fff; font-size: 22px; font-weight: 800; flex: 1; }
  .mistake-count { color: #feca57; font-size: 14px; }

  .subject-filter { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
  .subject-filter-btn {
    padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #8892b0; cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .subject-filter-btn.active { background: rgba(72,219,251,0.2); border-color: #48dbfb; color: #48dbfb; }
  .subject-filter-btn:active { transform: scale(0.95); }

  .mistake-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 16px; margin-bottom: 10px;
  }
  .mistake-card.mastered { opacity: 0.5; border-color: rgba(0,184,148,0.3); }

  .mistake-q-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .mistake-q-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(255,107,107,0.15); color: #ff6b6b; font-weight: 600;
  }
  .mistake-q-tag.math { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .mistake-q-tag.chinese { background: rgba(72,219,251,0.15); color: #48dbfb; }
  .mistake-q-tag.english { background: rgba(254,202,87,0.15); color: #feca57; }
  .mistake-q-diff { font-size: 11px; color: #8892b0; }
  .mistake-q-mastered {
    margin-left: auto; font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(0,184,148,0.15); color: #00b894; font-weight: 600;
  }

  .mistake-question { color: #ccd6f6; font-size: 15px; line-height: 1.6; margin-bottom: 12px; }

  .mistake-answer-row { display: flex; gap: 12px; margin-bottom: 8px; font-size: 13px; }
  .mistake-answer-badge {
    flex: 1; padding: 8px 12px; border-radius: 10px; font-weight: 600;
  }
  .mistake-answer-badge.wrong-answer { background: rgba(255,107,107,0.12); color: #ff6b6b; }
  .mistake-answer-badge.right-answer { background: rgba(0,184,148,0.12); color: #00b894; }

  .mistake-explanation {
    display: none; margin-top: 10px; padding: 12px;
    background: rgba(255,255,255,0.04); border-radius: 10px;
    color: #a8b2d1; font-size: 13px; line-height: 1.7;
  }
  .mistake-explanation.show { display: block; }

  .mistake-expand-btn {
    display: inline-block; margin-top: 4px;
    background: none; border: none; color: #48dbfb; font-size: 13px;
    cursor: pointer; padding: 4px 0;
  }
  .mistake-expand-btn:active { color: #0abde3; }

  .mistake-times { color: #8892b0; font-size: 12px; margin-left: 8px; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff; font-size: 14px; font-weight: 600;
    padding: 12px 24px; border-radius: 24px; z-index: 200;
    pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
    max-width: 90vw; text-align: center; line-height: 1.5;
  }
  .toast.show { opacity: 1; }

  .export-btn {
    display: block; margin: 8px auto 0;
    background: linear-gradient(135deg, #00b894, #00cec9);
    border: none; color: #fff; font-size: 14px; font-weight: 700;
    padding: 12px 28px; border-radius: 24px; cursor: pointer;
    transition: all 0.2s; box-shadow: 0 4px 15px rgba(0,184,148,0.3);
  }
  .export-btn:active { transform: scale(0.95); opacity: 0.9; }

  /* ===== PREVIEW MODAL ===== */
  .preview-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 150;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .preview-card {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 28px 24px;
    width: 90%; max-width: 360px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(30px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .preview-title {
    font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px;
  }
  .preview-subtitle { color: #8892b0; font-size: 13px; margin-bottom: 20px; }
  .preview-topic-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
  .preview-topic-tag {
    padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
    background: rgba(255,255,255,0.08); color: #ccd6f6;
  }
  .preview-topic-tag.math { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .preview-topic-tag.chinese { background: rgba(72,219,251,0.15); color: #48dbfb; }
  .preview-topic-tag.english { background: rgba(254,202,87,0.15); color: #feca57; }
  .preview-go-btn {
    width: 100%; padding: 16px; font-size: 18px; font-weight: 800;
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff; border: none; border-radius: 14px; cursor: pointer;
    box-shadow: 0 8px 30px rgba(255,107,107,0.3);
  }
  .preview-go-btn:active { transform: scale(0.96); }
  .preview-skip {
    margin-top: 12px; background: none; border: none; color: #8892b0;
    font-size: 13px; cursor: pointer;
  }

  /* ===== SUMMARY CARDS ===== */
  .summary-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85); z-index: 160;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.3s;
  }
  .summary-card {
    background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px; padding: 32px 24px;
    width: 90%; max-width: 360px; text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: slideUp 0.3s ease;

<script>
// ===== QUESTION BANK =====
// Loaded from question-bank.js as window.QUESTION_BANK
const Q = window.QUESTION_BANK;

function getSubjectName(subjectKey) {
  return Q.subjects[subjectKey] ? Q.subjects[subjectKey].name : subjectKey;
}
function getSubjectIcon(subjectKey) {
  return Q.subjects[subjectKey] ? Q.subjects[subjectKey].icon : '📝';
}
function getQuestionCount(subjectKey) {
  return Q.questions.filter(q => q.subject === subjectKey).length;
}

// ===== STATE =====
let currentQuestions = [];
let currentIndex = 0;
let score = 0;
let combo = 0;
let totalQuestions = 0;
let answered = false;
let userAnswers = {}; // track per-question correctness: { questionId: true/false }
let questionStartTime = 0; // for timing per question
let sessionRecords = []; // records for current session before saving

// ===== DOM refs =====
const $home = document.getElementById('homeScreen');
const $quiz = document.getElementById('quizScreen');
const $result = document.getElementById('resultScreen');
const $comboBar = document.getElementById('comboBar');
const $progressFill = document.getElementById('progressFill');
const $progressText = document.getElementById('progressText');
const $quizSubjectTag = document.getElementById('quizSubjectTag');
const $quizQuestion = document.getElementById('quizQuestion');
const $options = document.getElementById('optionsContainer');
const $feedback = document.getElementById('feedbackPanel');
const $feedbackHeader = document.getElementById('feedbackHeader');
const $feedbackBody = document.getElementById('feedbackBody');
const $nextBtn = document.getElementById('nextBtn');
const $retryBtn = document.getElementById('retryBtn');
const $particles = document.getElementById('particlesContainer');

// ===== NAVIGATION =====
function showScreen(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  screen.classList.add('active');
  // Refresh mistake count when going home
  if (screen === $home) refreshMistakeBadge();
}

function refreshMistakeBadge() {
  const pending = getMistakeQuestions('all').length;
  const mistakeBtn = document.getElementById('startMistakeBtn');
  if (pending > 0) {
    mistakeBtn.textContent = `🔁 错题重练 (${pending}道待复习)`;
    mistakeBtn.style.opacity = '1';
  } else {
    mistakeBtn.textContent = '🔁 错题重练 · 无错题';
    mistakeBtn.style.opacity = '0.6';
  }
}

// ===== CALENDAR =====
function renderCalendar() {
  const records = loadAllRecords();
  const today = new Date();
  const daySet = new Set(records.map(r => {
    const d = new Date(r.timestamp);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }));
  const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Show last 70 days
  const days = [];
  for (let i = 69; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    days.push({ key, isToday: key === todayStr, done: daySet.has(key) });
  }

  // Count streak
  let streak = 0;
  for (let i = days.length - 1; i >= 0; i--) {
    if (days[i].done) streak++;
    else if (!days[i].isToday) break;
  }
  document.getElementById('todayStreak').innerHTML = `${streak} <span style="font-size:16px">天</span>`;

  // Label
  const totalDays = daySet.size;
  document.getElementById('calendarLabel').innerHTML = `<span>📅 近70天学习记录</span><span style="color:#00b894">${totalDays}天</span>`;

  // Render grid
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = days.map(d => {
    let cls = 'calendar-day';
    if (d.done) cls += ' done';
    if (d.isToday) cls += ' today';
    return `<div class="${cls}" title="${d.key}"></div>`;
  }).join('');
}

// ===== LEVEL / XP SYSTEM =====
const XP_KEY = 'daily_quiz_xp';
const LEVELS = [
  { name: '青铜 · 新手学徒', icon: '🥉', min: 0 },
  { name: '白银 · 入门选手', icon: '🥈', min: 100 },
  { name: '黄金 · 实力新星', icon: '🥇', min: 300 },
  { name: '铂金 · 进阶达人', icon: '💎', min: 600 },
  { name: '钻石 · 学霸之路', icon: '👑', min: 1000 },
  { name: '王者 · 知识大师', icon: '🏆', min: 2000 },
];

function getXp() {
  try { return parseInt(localStorage.getItem(XP_KEY)) || 0; } catch(e) { return 0; }
}
function addXp(amount) {
  const cur = getXp();
  const oldLevel = getLevel(cur);
  const newVal = cur + amount;
  localStorage.setItem(XP_KEY, String(newVal));
  const newLevel = getLevel(newVal);
  if (newLevel !== oldLevel) {
    setTimeout(() => {
      showOverlayMsg(`🎉 升级！${LEVELS[newLevel].icon} ${LEVELS[newLevel].name}`);
      spawnParticles(window.innerWidth/2, window.innerHeight/2, 25, '🎉');
    }, 500);
  }
  return newVal;
}
function getLevel(xp) {
  let lvl = 0;
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) { lvl = i; break; }
  }
  return lvl;
}
function renderLevel() {
  const xp = getXp();
  const lvl = getLevel(xp);
  const cur = LEVELS[lvl];
  const next = LEVELS[lvl + 1];
  const progress = next ? Math.round(((xp - cur.min) / (next.min - cur.min)) * 100) : 100;
  document.getElementById('levelBadge').textContent = cur.icon;
  document.getElementById('levelName').textContent = cur.name;
  document.getElementById('levelBar').style.width = progress + '%';
  if (next) {
    document.getElementById('levelXp').textContent = `${xp - cur.min} / ${next.min - cur.min} 经验值`;
  } else {
    document.getElementById('levelXp').textContent = `${xp} 经验值 · 已达最高等级！`;
  }
}

// ===== DAILY MISSION =====
const MISSION_KEY = 'daily_mission';
const MISSIONS = [
  { id: 'streak3', desc: '连续答对 3 道题', icon: '🔥', reward: '+20 XP', xp: 20, check: (session) => session.maxCombo >= 3 },
  { id: 'correct10', desc: '本次闯关答对 10 题以上', icon: '🎯', reward: '+30 XP', xp: 30, check: (session) => session.score >= 10 },
  { id: 'speed5', desc: '5 秒内答对一道题', icon: '⚡', reward: '+15 XP', xp: 15, check: (session) => session.fastestCorrect <= 5000 },
  { id: 'perfect', desc: '全部答对（100%正确率）', icon: '💯', reward: '+50 XP', xp: 50, check: (session) => session.score === session.total },
  { id: 'allsub', desc: '三科各答对至少 1 题', icon: '🎨', reward: '+25 XP', xp: 25, check: (session) => {
    const ok = new Set(session.subjCorrect.filter(s => s.correct > 0).map(s => s.subject));
    return ok.size >= 3;
  }},
];

function getTodayMission() {
  const today = new Date().toDateString();
  try {
    const stored = JSON.parse(localStorage.getItem(MISSION_KEY));
    if (stored && stored.date === today) return stored;
  } catch(e) {}
  // Generate new mission
  const idx = Math.floor(Math.random() * MISSIONS.length);
  const mission = { date: today, mission: MISSIONS[idx].id, completed: false };
  localStorage.setItem(MISSION_KEY, JSON.stringify(mission));
  return mission;
}

function renderDailyMission() {
  const tm = getTodayMission();
  const mdef = MISSIONS.find(m => m.id === tm.mission);
  if (!mdef) return;
  const el = document.getElementById('dailyMission');
  el.style.display = 'flex';
  document.getElementById('missionTitle').textContent = '今日挑战';
  document.getElementById('missionDesc').textContent = `${mdef.icon} ${mdef.desc}`;
  document.getElementById('missionReward').textContent = mdef.reward;
  const statusEl = document.getElementById('missionStatus');
  if (tm.completed) {
    statusEl.textContent = '✅ 已完成';
    statusEl.className = 'daily-mission-status done';
    el.style.opacity = '0.7';
  } else {
    statusEl.textContent = '进行中';
    statusEl.className = 'daily-mission-status';
    el.style.opacity = '1';
  }
}

function checkAndCompleteMission(sessionStats) {
  const tm = getTodayMission();
  if (tm.completed) return;
  const mdef = MISSIONS.find(m => m.id === tm.mission);
  if (!mdef) return;
  if (mdef.check(sessionStats)) {
    tm.completed = true;
    localStorage.setItem(MISSION_KEY, JSON.stringify(tm));
    addXp(mdef.xp);
    renderLevel();
    setTimeout(() => showToast(`🎉 完成今日挑战！+${mdef.xp} XP`, 3000), 1000);
  }
}

function getSessionStats() {
  let maxCombo = 0, curCombo = 0, fastestCorrect = Infinity;
  const subjCorrect = [
    { subject: 'math', correct: 0 },
    { subject: 'chinese', correct: 0 },
    { subject: 'english', correct: 0 },
  ];
  sessionRecords.forEach(r => {
    if (r.isCorrect) {
      curCombo++;
      if (curCombo > maxCombo) maxCombo = curCombo;
      if (r.timeSpent < fastestCorrect) fastestCorrect = r.timeSpent;
      const sc = subjCorrect.find(s => s.subject === r.subject);
      if (sc) sc.correct++;
    } else { curCombo = 0; }
  });
  return { maxCombo, fastestCorrect: fastestCorrect === Infinity ? 99999 : fastestCorrect, score, total: totalQuestions, subjCorrect };
}

// ===== EXPORT MISTAKE CARD AS IMAGE =====
function exportMistakeCard() {
  const entries = getMistakeEntries().filter(e => !e.mastered);
  if (entries.length === 0) {
    showToast('🎉 没有待复习的错题！', 2000);
    return;
  }

  // Build a card with Canvas
  const canvas = document.createElement('canvas');
  const w = 400, h = Math.min(600, 200 + entries.length * 28);
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a1a2e'); bg.addColorStop(1, '#16213e');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, w, h);

  // Title
  ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('📝 错题复习卡片', w/2, 40);

  // Date
  const today = new Date().toLocaleDateString('zh-CN');
  ctx.fillStyle = '#8892b0'; ctx.font = '12px sans-serif';
  ctx.fillText(today + ' · 共' + entries.length + '道待复习', w/2, 62);

  // Separator
  ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(30, 75); ctx.lineTo(w-30, 75); ctx.stroke();

  // List top 15 entries
  const subjNames = { math:'数学', chinese:'语文', english:'英语' };
  const subjColors = { math:'#ff6b6b', chinese:'#48dbfb', english:'#feca57' };
  let y = 100;
  const top = entries.slice(0, 15);
  top.forEach((e, i) => {
    const q = Q.questions.find(qq => qq.id === e.questionId);
    const name = subjNames[e.subject] || e.subject;
    const color = subjColors[e.subject] || '#fff';
    ctx.fillStyle = color; ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${i+1}. [${name}] ${getTopicName(e.topic)}`, 30, y);
    ctx.fillStyle = '#ff6b6b'; ctx.font = '11px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`答错${e.wrongCount}次`, w-30, y);
    y += 24;
  });

  // Footer
  ctx.fillStyle = '#8892b0'; ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('每日闯关 · 学习小助手', w/2, h - 20);

  // Download
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `错题卡片_${today.replace(/\//g, '-')}.png`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✅ 学习卡片已下载，可分享给皓祤哥', 2500);
  }, 'image/png');
}

function awardXpForQuiz() {
  // Base: 10 per correct answer, + combo bonus
  let earned = score * 10;
  if (combo >= 10) earned += 50;
  else if (combo >= 5) earned += 20;
  else if (combo >= 3) earned += 10;
  addXp(earned);
  renderLevel();
  return earned;
}

// ===== COMBO BAR =====
function updateComboBar() {
  if (combo >= 2) {
    $comboBar.classList.add('visible');
    $comboBar.innerHTML = `🔥 连对 ${combo}`;
    if (combo >= 3) {

// ===== SOUND EFFECTS =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
  return audioCtx;
}
function playComboSound(level) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    const freq = level >= 10 ? 880 : level >= 5 ? 660 : 523;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.setValueAtTime(freq * 1.5, ctx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) { /* silent fail */ }
}

const STORAGE_KEY = 'daily_quiz_records';

function getTopicName(topicKey) {
  if (Q.topics && Q.topics[topicKey]) {
    return Q.topics[topicKey].name;
  }
  return topicKey;
}

function recordAnswer(q, selectedIdx, isCorrect, timeSpent) {
  const record = {
    id: 'rec_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    questionId: q.id,
    subject: q.subject,
    topic: q.topic,
    difficulty: q.difficulty,
    selectedAnswer: selectedIdx,
    correctAnswer: q.answer,
    isCorrect: isCorrect,
    timestamp: Date.now(),
    timeSpent: timeSpent
  };
  sessionRecords.push(record);
}

function saveSessionRecords() {
  if (sessionRecords.length === 0) return;
  const existing = loadAllRecords();
  const all = existing.concat(sessionRecords);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  } catch (e) {
    // localStorage full — trim old records
    const trimmed = all.slice(-500);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(trimmed));
  }
  sessionRecords = [];
}

function loadAllRecords() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) {
    return [];
  }
}

function clearAllRecords() {
  localStorage.removeItem(STORAGE_KEY);
  sessionRecords = [];
}

function exportRecords() {

    return;
  }

  // --- Build human-readable report ---
  const now = new Date();
  const timeStr = now.toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });

  const total = records.length;
  const correct = records.filter(r => r.isCorrect).length;
  const accuracy = Math.round((correct / total) * 100);
  const uniqueDays = new Set(records.map(r => new Date(r.timestamp).toDateString())).size;

  // Today
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayRecords = records.filter(r => r.timestamp >= todayStart.getTime());
  const todayCorrect = todayRecords.filter(r => r.isCorrect).length;

  // Per subject
  const subjNames = { math:'数学', chinese:'语文', english:'英语' };
  const subjIcons = { math:'📐', chinese:'📖', english:'🌍' };
  const subjStats = {};
  ['math','chinese','english'].forEach(s => {
    const sr = records.filter(r => r.subject === s);
    const sc = sr.filter(r => r.isCorrect).length;
    subjStats[s] = { total: sr.length, correct: sc, pct: sr.length > 0 ? Math.round((sc/sr.length)*100) : 0 };
  });

  // Per topic
  const topicMap = {};
  records.forEach(r => {
    const key = r.subject + '|' + r.topic;
    if (!topicMap[key]) topicMap[key] = { subject: r.subject, topic: r.topic, total:0, correct:0 };
    topicMap[key].total++;
    if (r.isCorrect) topicMap[key].correct++;
  });
  const topicEntries = Object.values(topicMap).sort((a,b) => {
    const ap = a.total>0 ? a.correct/a.total : 1;
    const bp = b.total>0 ? b.correct/b.total : 1;
    return ap - bp;
  });

  let report = '📊 每日闯关 · 答题报告\n';
  report += `导出时间: ${timeStr}\n`;
  report += '═══════════════════════════\n\n';
  report += '📈 总览\n';
  report += `  总答题数: ${total}\n`;
  report += `  总正确率: ${accuracy}%\n`;
  report += `  学习天数: ${uniqueDays}\n`;
  report += `  今日答题: ${todayRecords.length}（对${todayCorrect}题）\n\n`;

  report += '📚 各科掌握度\n';
  Object.keys(subjStats).forEach(s => {
    const st = subjStats[s];
    const bar = st.total > 0 ? '█'.repeat(Math.round(st.pct/10)) + '░'.repeat(10-Math.round(st.pct/10)) : '░░░░░░░░░░';
    report += `  ${subjIcons[s]} ${subjNames[s]}: ${st.correct}/${st.total} (${st.pct}%) ${bar}\n`;
  });

  report += '\n🔍 知识点详情\n';
  topicEntries.forEach(t => {
    const pct = Math.round((t.correct/t.total)*100);
    const bar = '█'.repeat(Math.round(pct/10)) + '░'.repeat(10-Math.round(pct/10));
    const icon = subjIcons[t.subject] || '📝';
    report += `  ${icon} ${getTopicName(t.topic)}: ${t.correct}/${t.total} (${pct}%) ${bar}\n`;
  });

  // Recent 30 records
  const recent = records.slice(-30).reverse();
  const diffLabels = {1:'简单',2:'中等',3:'困难'};
  report += '\n📋 最近答题明细\n';
  recent.forEach(r => {
    const d = new Date(r.timestamp);
    const dt = d.toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
    const icon = r.isCorrect ? '✅' : '❌';
    const sec = Math.round(r.timeSpent/1000);
    report += `  ${dt} ${icon} ${subjIcons[r.subject]||''}${getTopicName(r.topic)}(${diffLabels[r.difficulty]||'?'}) 用时${sec}秒\n`;
  });

  report += '\n═══════════════════════════\n';
  report += '📎 以下为原始JSON数据，可用于程序分析\n';
  report += JSON.stringify(records);

  // Copy to clipboard (primary)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(report).then(() => {
      showToast('✅ 报告已复制！打开微信粘贴发送给皓祤哥即可', 3000);
    }).catch(() => {
      fallbackCopy(report);
    });
  } else {
    fallbackCopy(report);
  }
}

function fallbackCopy(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  textarea.style.top = '-9999px';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();
  try {
    document.execCommand('copy');
    showToast('✅ 报告已复制！打开微信粘贴发送给皓祤哥即可', 3000);
  } catch (e) {
    showToast('⚠️ 复制失败，请尝试截图发送', 2500);
  }
  document.body.removeChild(textarea);
}

const QUESTIONS_PER_SUBJECT = 5; // 每科抽取5道题

// ===== MISTAKE BOOK & RETRY =====
const MASTERED_KEY = 'daily_quiz_mastered';

function loadMasteredIds() {
  try {
    const raw = localStorage.getItem(MASTERED_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function saveMasteredIds(ids) {
  localStorage.setItem(MASTERED_KEY, JSON.stringify(ids));
}

function addMastered(questionId) {
  const ids = loadMasteredIds();
  if (!ids.includes(questionId)) {
    ids.push(questionId);
    saveMasteredIds(ids);
  }
}

function removeMastered(questionId) {
  const ids = loadMasteredIds().filter(id => id !== questionId);
  saveMasteredIds(ids);
}

function resetAllMastered() {
  localStorage.removeItem(MASTERED_KEY);
}

// Get all wrong question entries grouped by questionId
// Returns: [{questionId, subject, topic, wrongCount, totalCount, lastWrongTime, mastered}]
function getMistakeEntries() {
  const records = loadAllRecords();
  const mastered = loadMasteredIds();
  const map = {};

  records.forEach(r => {
    if (!map[r.questionId]) {
      map[r.questionId] = { questionId: r.questionId, subject: r.subject, topic: r.topic, wrongCount: 0, totalCount: 0, lastWrongTime: 0 };
    }
    map[r.questionId].totalCount++;
    if (!r.isCorrect) {
      map[r.questionId].wrongCount++;
      if (r.timestamp > map[r.questionId].lastWrongTime) {
        map[r.questionId].lastWrongTime = r.timestamp;
      }
    }
  });

  // Filter: at least one wrong answer, and not mastered
  const entries = Object.values(map)
    .filter(e => e.wrongCount > 0)
    .map(e => ({ ...e, mastered: mastered.includes(e.questionId) }))
    .sort((a, b) => {
      // Un-mastered first, then by most wrong
      if (a.mastered !== b.mastered) return a.mastered ? 1 : -1;
      return b.wrongCount - a.wrongCount;
    });

  return entries;
}

// Get the actual question objects for mistake pool (not mastered only)
function getMistakeQuestions(subjectFilter) {
  const entries = getMistakeEntries().filter(e => !e.mastered);
  if (subjectFilter && subjectFilter !== 'all') {
    return entries.filter(e => e.subject === subjectFilter);
  }
  return entries;
}

// Render error book

// Start a quiz from mistake pool
function startMistakeQuiz() {
  const mistakeQs = getMistakeQuestions('all');
  if (mistakeQs.length === 0) {
    alert('🎉 太棒了！没有待复习的错题！');
    return;
  }

  isMistakeMode = true;

  // Get actual question objects
  const qIds = new Set(mistakeQs.map(e => e.questionId));
  let selected = Q.questions.filter(q => qIds.has(q.id));

  // If fewer than 5, pad with random new questions
  if (selected.length < QUESTIONS_PER_SUBJECT) {
    const otherQs = Q.questions.filter(q => !qIds.has(q.id));
    const shuffled = otherQs.sort(() => Math.random() - 0.5);
    const padCount = Math.min(QUESTIONS_PER_SUBJECT - selected.length, shuffled.length);
    selected = selected.concat(shuffled.slice(0, padCount));
  }

  // Shuffle and pick
  selected = selected.sort(() => Math.random() - 0.5);
  if (selected.length > 15) selected = selected.slice(0, 15);

  // Start quiz
  currentQuestions = selected;
  currentIndex = 0;
  score = 0;
  combo = 0;
  userAnswers = {};
  sessionRecords = [];

  totalQuestions = currentQuestions.length;
  showScreen($quiz);
  updateComboBar();
  loadQuestion();
}

function buildQuestionSet(subject) {
  const pool = [...Q.questions.filter(q => q.subject === subject)];
  const shuffled = pool.sort(() => Math.random() - 0.5);
  let selected = shuffled.slice(0, QUESTIONS_PER_SUBJECT);

  // Mix in 2-3 yesterday's mistakes (spaced repetition)
  const yesterdayMistakes = getYesterdayMistakes(subject);
  if (yesterdayMistakes.length > 0) {
    const mixCount = Math.min(3, yesterdayMistakes.length, QUESTIONS_PER_SUBJECT - 1);
    const mixIn = yesterdayMistakes.sort(() => Math.random() - 0.5).slice(0, mixCount);
    // Replace last few questions with mistakes
    selected = [...selected.slice(0, QUESTIONS_PER_SUBJECT - mixCount), ...mixIn];
  }

  return selected;
}

function getYesterdayMistakes(subject) {
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yStart = new Date(yesterday); yStart.setHours(0,0,0,0);
  const yEnd = new Date(yesterday); yEnd.setHours(23,59,59,999);

  const records = loadAllRecords();
  const yesterdayWrongIds = new Set(
    records.filter(r => r.timestamp >= yStart.getTime() && r.timestamp <= yEnd.getTime() && !r.isCorrect)
      .map(r => r.questionId)
  );

  // Also get any unmastered mistakes from earlier
  const unmasteredIds = new Set(getMistakeQuestions(subject).map(e => e.questionId));

  const allIds = new Set([...yesterdayWrongIds, ...unmasteredIds]);
  // Remove mastered
  const mastered = new Set(loadMasteredIds());
  const finalIds = [...allIds].filter(id => !mastered.has(id));

  return Q.questions.filter(q => finalIds.includes(q.id) && q.subject === subject);
}

function loadQuestion() {
  if (currentIndex >= totalQuestions) {
    showResult();
    return;
  }
  answered = false;
  $feedback.classList.remove('show', 'correct-fb', 'wrong-fb');
  $nextBtn.classList.remove('show');

  const q = currentQuestions[currentIndex];
  const subjIcon = getSubjectIcon(q.subject);
  const subjName = getSubjectName(q.subject);
  $quizSubjectTag.innerHTML = `${subjIcon} ${subjName}`;
  $quizQuestion.textContent = q.question;
  $progressFill.style.width = ((currentIndex / totalQuestions) * 100) + '%';
  $progressText.textContent = `${currentIndex + 1}/${totalQuestions}`;

  // Start timing for this question
  questionStartTime = Date.now();

  // Build options
  $options.innerHTML = '';
  q.options.forEach((opt, idx) => {
    const div = document.createElement('div');
    div.className = 'option';
    const optText = opt.slice(3);
    div.innerHTML = `<span class="option-letter">${['A','B','C','D'][idx]}</span><span>${optText}</span>`;
    div.addEventListener('click', () => selectAnswer(idx, div));
    $options.appendChild(div);
  });
}

function selectAnswer(idx, el) {
  if (answered) return;
  answered = true;

  const q = currentQuestions[currentIndex];
  const isCorrect = idx === q.answer;
  const timeSpent = Date.now() - questionStartTime;
  const allOptions = $options.querySelectorAll('.option');

  // Record this answer
  recordAnswer(q, idx, isCorrect, timeSpent);

  // Highlight
  allOptions.forEach(o => o.classList.add('disabled'));
  allOptions[q.answer].classList.add('correct');

  if (isCorrect) {
    score++;
    combo++;
    el.classList.add('correct');
    userAnswers[q.id] = true;

    // Sound + celebration for combos
    if (combo === 3) { playComboSound(3); showOverlayMsg('🔥 连对3题！'); }
    else if (combo === 5) { playComboSound(5); showOverlayMsg('⚡ 连对5题！'); spawnParticles(window.innerWidth/2, window.innerHeight/2, 20, '🎉'); }
    else if (combo === 10) { playComboSound(10); showOverlayMsg('👑 十连击！'); spawnParticles(window.innerWidth/2, window.innerHeight/2, 30, '🏆'); }

    // Spawn celebration
    const rect = el.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top, 12, '✨');

    $feedback.classList.add('show', 'correct-fb');
    $feedbackHeader.textContent = '✅ 太棒了！回答正确！';
    $feedbackBody.textContent = q.explanation;
  } else {
    combo = 0;
    el.classList.add('wrong');
    userAnswers[q.id] = false;

    $feedback.classList.add('show', 'wrong-fb');
    $feedbackHeader.textContent = '💡 又发现一个薄弱点！来看看解析：';
    $feedbackBody.textContent = q.explanation;
  }

  updateComboBar();
  $nextBtn.classList.add('show');
  $nextBtn.focus();
}

function nextQuestion() {
  currentIndex++;
  loadQuestion();
}

function showSummaryCards(onDone) {
  // Collect unique topics from this quiz
  const topicKeys = [...new Set(currentQuestions.map(q => q.topic))];
  if (topicKeys.length === 0) { onDone(); return; }

  let cardIdx = 0;
  const subjIcons = { math:'📐', chinese:'📖', english:'🌍' };
  const subjClass = { math:'math', chinese:'chinese', english:'english' };

  const overlay = document.getElementById('summaryOverlay');

  function renderCard() {
    if (cardIdx >= topicKeys.length) {
      overlay.style.display = 'none';
      onDone();
      return;
    }
    const tk = topicKeys[cardIdx];
    const topic = Q.topics[tk];
    const tip = TOPIC_TIPS[tk] || '坚持练习，你一定能掌握这个知识点！';
    const sc = topic ? topic.subject : 'math';
    const icon = subjIcons[sc] || '📝';

    overlay.innerHTML = `
      <div class="summary-overlay">
        <div class="summary-card">
          <div class="summary-icon">${icon}</div>
          <div class="summary-topic">${getTopicName(tk)}</div>
          <div class="summary-tip">💡 ${tip}</div>
          <div class="summary-pager">${cardIdx + 1} / ${topicKeys.length}</div>
          <button class="summary-next-btn" id="summaryNextBtn">${cardIdx + 1 >= topicKeys.length ? '📊 查看成绩' : '下一张 →'}</button>
        </div>
      </div>`;
    overlay.style.display = 'block';

    document.getElementById('summaryNextBtn').addEventListener('click', () => {
      cardIdx++;
      renderCard();
    });
  }

  renderCard();
}

// ===== RESULT =====
function showResult() {
  saveSessionRecords();

  if (isMistakeMode) {
    const wrongIds = new Set(getMistakeEntries().filter(e => !e.mastered).map(e => e.questionId));
    currentQuestions.forEach(q => {
      if (userAnswers[q.id] === true && wrongIds.has(q.id)) {
        addMastered(q.id);
      }
    });
    isMistakeMode = false;
  }

  // Show summary cards first, then result
  showSummaryCards(() => {
    _showResultScreen();
  });
}

function _showResultScreen() {
  showScreen($result);
  $comboBar.classList.remove('visible');

  // Award XP
  const earnedXp = awardXpForQuiz();
  // Check daily mission
  const sessionStats = getSessionStats();
  checkAndCompleteMission(sessionStats);

  const pct = Math.round((score / totalQuestions) * 100);
  const $icon = document.getElementById('resultIcon');
  const $score = document.getElementById('resultScore');
  const $label = document.getElementById('resultLabel');
  const $detail = document.getElementById('resultDetail');

  if (pct === 100) {
    $icon.textContent = '🏆';
    $label.textContent = '全部答对！你太厉害了！';
  } else if (pct >= 67) {
    $icon.textContent = '🎉';
    $label.textContent = '不错！继续加油！';
  } else if (pct >= 33) {
    $icon.textContent = '💪';
    $label.textContent = '还有提升空间，坚持练！';
  } else {
    $icon.textContent = '📚';
    $label.textContent = '没关系，多看解析慢慢来！';
  }

  $score.textContent = `${score}/${totalQuestions}`;
  $label.innerHTML = `${$label.textContent}<br><span style="color:#feca57;font-size:14px;">+${earnedXp} 经验值</span>`;

  // Per-subject stats with actual correctness
  const subjStats = { math: { correct: 0, total: 0 }, chinese: { correct: 0, total: 0 }, english: { correct: 0, total: 0 } };
  currentQuestions.forEach(q => {
    if (subjStats[q.subject]) {
      subjStats[q.subject].total++;
      if (userAnswers[q.id]) subjStats[q.subject].correct++;
    }
  });

  const subjects = [
    { key: 'math', name: '数学（有理数运算）', icon: '📐' },
    { key: 'chinese', name: '语文（字词基础）', icon: '📖' },
    { key: 'english', name: '英语（基础语法）', icon: '🌍' }
  ];

  $detail.innerHTML = subjects.map(s => {
    const stats = subjStats[s.key];
    const scoreClass = stats.total > 0 && stats.correct === stats.total ? 'good' : (stats.correct < stats.total / 2 ? 'bad' : '');
    return `
      <div class="result-row">
        <div class="result-row-icon">${s.icon}</div>
        <div class="result-row-text">${s.name}</div>
        <div class="result-row-score ${scoreClass}">${stats.correct}/${stats.total}</div>
      </div>`;
  }).join('');
}

function startQuiz(subject) {
  // Show preview first
  showTopicPreview(subject, () => {
    _doStartQuiz(subject);
  });
}

function _doStartQuiz(subject) {
  isMistakeMode = false;
  currentIndex = 0;
  score = 0;
  combo = 0;
  userAnswers = {};
  sessionRecords = [];

  if (subject === 'all') {
    currentQuestions = [
      ...buildQuestionSet('math'),
      ...buildQuestionSet('chinese'),
      ...buildQuestionSet('english'),
    ];
  } else {
    currentQuestions = buildQuestionSet(subject);
  }

  totalQuestions = currentQuestions.length;
  showScreen($quiz);
  updateComboBar();
  loadQuestion();
}
